<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>9th Bae's Classic Open 2026 - Golf, Travel and People</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#020812;
      --bg2:#061323;
      --panel:#07101b;
      --panel2:#0a1420;
      --ink:#fff4dc;
      --ink-soft:rgba(255,244,220,.78);
      --muted:rgba(255,232,190,.62);
      --gold:#d7aa62;
      --gold2:#f2d392;
      --gold3:#9f7130;
      --line:rgba(215,170,98,.34);
      --line-soft:rgba(215,170,98,.18);
      --shadow:0 28px 90px rgba(0,0,0,.48);
      --radius:22px;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      background:
        radial-gradient(circle at 12% 0%, rgba(215,170,98,.16), transparent 26%),
        radial-gradient(circle at 92% 12%, rgba(255,211,141,.11), transparent 24%),
        linear-gradient(180deg, #020812 0%, #061323 42%, #020812 100%);
      color:var(--ink);
      font-family:"Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing:-.02em;
      overflow-x:hidden;
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.020) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.7), transparent 78%);
    }
    .wrap { width:min(1180px, calc(100% - 44px)); margin:0 auto; }

    /* Base exact poster design */
    .stage {
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      background:
        radial-gradient(circle at top left, rgba(212,163,74,0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(212,163,74,0.12), transparent 22%),
        linear-gradient(180deg, #020812 0%, #061323 100%);
    }
    .poster-wrap {
      position:relative;
      width:min(100%, 1400px);
      aspect-ratio:4/3;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .poster {
      width:100%;
      height:auto;
      display:block;
      box-shadow:0 24px 80px rgba(0,0,0,0.45);
      border-radius:2px;
    }
    .poster-cta {
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      z-index:3;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border:1px solid rgba(242,211,146,.48);
      border-radius:999px;
      background:rgba(2,8,18,.54);
      color:var(--gold2);
      text-decoration:none;
      font-family:"DM Mono", monospace;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      backdrop-filter:blur(12px);
      box-shadow:0 14px 34px rgba(0,0,0,.36);
    }
    .poster-cta span { transform:translateY(-1px); }

    /* Detail content adapted from index.html into the base noir/gold design */
    .detail-main {
      position:relative;
      padding:94px 0 104px;
      border-top:1px solid rgba(242,211,146,.20);
      background:
        radial-gradient(circle at 14% 2%, rgba(215,170,98,.14), transparent 25%),
        radial-gradient(circle at 84% 14%, rgba(255,255,255,.07), transparent 24%),
        linear-gradient(180deg, #061323 0%, #030912 46%, #020812 100%);
    }
    .detail-main::before {
      content:"";
      position:absolute;
      top:0;
      left:50%;
      width:min(1120px, 88vw);
      height:1px;
      transform:translateX(-50%);
      background:linear-gradient(90deg, transparent, rgba(242,211,146,.78), transparent);
      box-shadow:0 0 18px rgba(242,211,146,.26);
    }
    .section-head {
      display:grid;
      grid-template-columns:auto auto 1fr;
      align-items:end;
      gap:18px;
      margin:0 0 24px;
    }
    .section-head:not(:first-child) { margin-top:84px; }
    .section-num {
      font-family:"DM Mono", monospace;
      font-size:12px;
      letter-spacing:.28em;
      color:var(--gold);
      text-transform:uppercase;
      padding-bottom:5px;
    }
    .section-title {
      margin:0;
      font-family:"Playfair Display", "Noto Serif KR", serif;
      font-size:clamp(34px, 4.5vw, 58px);
      line-height:1;
      font-weight:700;
      letter-spacing:-.055em;
      color:var(--ink);
      text-shadow:0 14px 42px rgba(0,0,0,.32);
    }
    .section-rule {
      height:1px;
      margin-bottom:10px;
      background:linear-gradient(90deg, rgba(242,211,146,.64), transparent);
    }
    .invite-block {
      display:grid;
      grid-template-columns:minmax(0, 1.18fr) minmax(320px, .82fr);
      gap:20px;
    }
    .invite-cell, .two-col-cell, .team-cell, .schedule-section, .chips-section {
      position:relative;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:
        linear-gradient(180deg, rgba(255,244,220,.075), rgba(255,244,220,.028)),
        rgba(3,9,18,.70);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .invite-cell::before, .two-col-cell::before, .team-cell::before, .schedule-section::before, .chips-section::before {
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      border:1px solid rgba(255,255,255,.07);
      pointer-events:none;
    }
    .invite-cell { padding:clamp(28px, 4vw, 46px); }
    .invite-cell.accent {
      background:
        radial-gradient(circle at 84% 0%, rgba(242,211,146,.18), transparent 34%),
        linear-gradient(150deg, rgba(4,11,20,.96), rgba(17,25,34,.90));
      border-color:rgba(242,211,146,.42);
    }
    .invite-cell-label, .two-col-cell-title {
      font-family:"DM Mono", monospace;
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:18px;
      font-weight:500;
    }
    .invite-cell p {
      margin:0;
      font-family:"Noto Serif KR", serif;
      font-size:18px;
      line-height:1.95;
      color:var(--ink-soft);
      letter-spacing:-.035em;
    }
    .invite-cell p strong { color:var(--gold2); font-weight:700; }
    .invite-quote {
      position:relative;
      margin-top:28px;
      padding:26px 28px 25px;
      border-left:2px solid var(--gold);
      border-radius:0 20px 20px 0;
      background:rgba(215,170,98,.095);
      font-family:"Noto Serif KR", serif;
      font-size:17px;
      line-height:1.88;
      color:rgba(255,244,220,.86);
      letter-spacing:-.035em;
    }
    .invite-quote::before {
      content:"“";
      position:absolute;
      top:-18px;
      left:20px;
      font-family:"Playfair Display", serif;
      font-size:72px;
      line-height:1;
      color:rgba(242,211,146,.20);
    }
    .invite-icon-row {
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      margin-top:28px;
    }
    .invite-icon-card {
      min-height:156px;
      padding:20px 12px 17px;
      border:1px solid var(--line-soft);
      border-radius:18px;
      background:rgba(255,244,220,.055);
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
    }
    .invite-icon-card .ico { font-size:25px; line-height:1; }
    .invite-icon-card strong {
      font-family:"Playfair Display", "Noto Serif KR", serif;
      font-size:19px;
      color:var(--gold2);
      letter-spacing:-.04em;
    }
    .invite-icon-card span:last-child {
      font-size:13px;
      line-height:1.55;
      color:var(--muted);
      letter-spacing:-.03em;
    }
    .chips-section { padding:28px; }
    .chips { display:flex; flex-wrap:wrap; gap:12px; }
    .chip {
      display:inline-flex;
      align-items:center;
      min-height:46px;
      padding:11px 17px;
      border:1px solid var(--line-soft);
      border-radius:999px;
      background:rgba(255,244,220,.052);
      color:rgba(255,244,220,.86);
      font-size:15px;
      font-weight:700;
      letter-spacing:-.035em;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }
    .chip::before {
      content:"";
      width:7px;
      height:7px;
      border-radius:50%;
      margin-right:10px;
      background:var(--gold);
      box-shadow:0 0 0 4px rgba(215,170,98,.13);
    }
    .two-col {
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
      gap:20px;
    }
    .two-col-cell { padding:clamp(26px, 3.4vw, 40px); }
    .name-grid { display:grid; gap:12px; }
    .name-cell {
      position:relative;
      padding:17px 18px 17px 42px;
      border:1px solid var(--line-soft);
      border-radius:16px;
      background:rgba(255,244,220,.052);
      color:rgba(255,244,220,.88);
      font-size:17px;
      line-height:1.55;
      font-weight:700;
      letter-spacing:-.035em;
    }
    .name-cell::before {
      content:"";
      position:absolute;
      left:18px;
      top:50%;
      width:9px;
      height:9px;
      transform:translateY(-50%);
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 5px rgba(215,170,98,.12);
    }
    .format-card {
      display:grid;
      grid-template-columns:54px 1fr;
      gap:16px;
      align-items:center;
      padding:18px 0;
      border-bottom:1px solid var(--line-soft);
    }
    .format-card:last-child { border-bottom:0; padding-bottom:0; }
    .format-card:first-of-type { padding-top:0; }
    .format-num {
      width:54px;
      height:54px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-family:"Playfair Display", Georgia, serif;
      font-size:24px;
      font-weight:900;
      color:#021020;
      background:linear-gradient(145deg, var(--gold2), var(--gold));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.25), 0 12px 22px rgba(0,0,0,.22);
    }
    .format-body strong {
      display:block;
      margin-bottom:6px;
      font-family:"Noto Serif KR", serif;
      font-size:19px;
      color:var(--gold2);
      letter-spacing:-.04em;
    }
    .format-body span {
      display:block;
      font-size:15px;
      line-height:1.64;
      color:var(--muted);
      letter-spacing:-.03em;
    }
    .teams-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
    }
    .team-cell { padding:26px; transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
    .team-cell:hover { transform:translateY(-3px); border-color:rgba(242,211,146,.48); box-shadow:0 28px 90px rgba(0,0,0,.56); }
    .team-num {
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-family:"DM Mono", monospace;
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:18px;
    }
    .team-num::before { content:""; width:26px; height:1px; background:var(--gold); }
    .team-pair {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr)) auto repeat(2, minmax(0, 1fr));
      align-items:center;
      gap:10px;
    }
    .team-player {
      min-height:54px;
      padding:12px 12px;
      border-radius:16px;
      background:rgba(255,244,220,.055);
      border:1px solid var(--line-soft);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
    }
    .team-player-dot {
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--gold) !important;
      flex:0 0 auto;
      box-shadow:0 0 0 4px rgba(215,170,98,.12);
    }
    .team-player-name {
      font-size:17px;
      font-weight:800;
      letter-spacing:-.04em;
      color:rgba(255,244,220,.90);
      white-space:nowrap;
    }
    .team-divider {
      font-family:"Playfair Display", Georgia, serif;
      font-style:italic;
      color:var(--gold2);
      font-weight:700;
      opacity:.84;
      padding:0 4px;
    }
    .schedule-section { padding:clamp(24px, 3vw, 36px); }
    .day-tabs {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      margin-bottom:22px;
    }
    .day-tab {
      min-height:86px;
      padding:18px 20px;
      border-radius:18px;
      border:1px solid var(--line-soft);
      background:rgba(255,244,220,.052);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .day-tab.primary {
      background:linear-gradient(145deg, rgba(242,211,146,.92), rgba(163,113,48,.86));
      border-color:rgba(242,211,146,.48);
      color:#061323;
      box-shadow:0 17px 42px rgba(0,0,0,.28);
    }
    .day-tab-date {
      font-family:"Noto Serif KR", serif;
      font-size:20px;
      font-weight:800;
      letter-spacing:-.045em;
      color:var(--gold2);
    }
    .day-tab.primary .day-tab-date { color:#061323; }
    .day-tab-pill {
      flex:0 0 auto;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      font-family:"DM Mono", monospace;
      font-size:10px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--gold);
      background:rgba(255,244,220,.06);
    }
    .day-tab.primary .day-tab-pill {
      border-color:rgba(6,19,35,.30);
      color:#061323;
      background:rgba(255,255,255,.16);
    }
    .schedule-body {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
    }
    .sched-col {
      position:relative;
      padding:6px 0;
      border-radius:18px;
      background:rgba(255,244,220,.032);
      border:1px solid rgba(215,170,98,.10);
    }
    .sched-row {
      position:relative;
      display:grid;
      grid-template-columns:104px 1fr;
      gap:18px;
      padding:18px 18px;
      border-bottom:1px solid rgba(215,170,98,.12);
    }
    .sched-row:last-child { border-bottom:0; }
    .sched-time {
      font-family:"DM Mono", monospace;
      font-size:13px;
      line-height:1.36;
      color:var(--gold);
      letter-spacing:-.02em;
      padding-top:4px;
    }
    .sched-detail { position:relative; padding-left:20px; }
    .sched-detail::before {
      content:"";
      position:absolute;
      left:0;
      top:7px;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 5px rgba(215,170,98,.12);
    }
    .sched-title {
      font-family:"Noto Serif KR", serif;
      font-size:18px;
      font-weight:800;
      color:var(--ink);
      line-height:1.45;
      letter-spacing:-.045em;
    }
    .sched-desc {
      margin-top:4px;
      font-size:14px;
      line-height:1.65;
      color:var(--muted);
      letter-spacing:-.03em;
    }
    .site-footer {
      background:
        radial-gradient(circle at 18% 0%, rgba(242,211,146,.16), transparent 32%),
        linear-gradient(135deg, #020812, #061323 54%, #020812);
      color:rgba(255,244,220,.76);
      border-top:1px solid rgba(242,211,146,.24);
    }
    .footer-inner {
      min-height:126px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:28px;
      padding:26px 0;
    }
    .footer-logo {
      font-family:"Playfair Display", "Noto Serif KR", serif;
      font-size:28px;
      font-weight:700;
      color:var(--ink);
      letter-spacing:-.05em;
    }
    .footer-sub {
      margin-top:8px;
      font-family:"DM Mono", monospace;
      font-size:11px;
      letter-spacing:.14em;
      color:var(--gold);
      text-transform:uppercase;
    }
    .footer-copy {
      font-family:"DM Mono", monospace;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(242,211,146,.72);
      text-align:right;
      line-height:1.7;
    }
    @media (max-width:1040px) {
      .invite-block, .two-col, .teams-grid, .schedule-body { grid-template-columns:1fr; }
    }
    @media (max-width:760px) {
      .stage { padding:0; min-height:auto; }
      .poster-wrap { width:100vw; }
      .poster { box-shadow:none; border-radius:0; }
      .poster-cta { display:none; }
      .wrap { width:min(100% - 28px, 1180px); }
      .detail-main { padding:58px 0 72px; }
      .section-head { grid-template-columns:auto 1fr; align-items:center; gap:12px; margin-bottom:20px; }
      .section-rule { grid-column:1 / -1; margin-bottom:0; }
      .section-head:not(:first-child) { margin-top:60px; }
      .section-num { font-size:10px; letter-spacing:.20em; }
      .section-title { font-size:clamp(31px, 9.2vw, 42px); line-height:1.05; }
      .invite-cell, .two-col-cell, .team-cell, .schedule-section, .chips-section { padding:22px 20px; border-radius:18px; }
      .invite-cell p { font-size:16px; line-height:1.86; }
      .invite-quote { padding:22px 20px; font-size:15.5px; }
      .invite-icon-row { grid-template-columns:1fr; }
      .chip { width:100%; }
      .team-pair { grid-template-columns:1fr 1fr; gap:9px; }
      .team-divider { grid-column:1 / -1; text-align:center; padding:2px 0; }
      .day-tabs { grid-template-columns:1fr; }
      .day-tab { flex-direction:column; align-items:flex-start; min-height:auto; }
      .sched-row { grid-template-columns:78px 1fr; gap:12px; padding:16px 12px; }
      .sched-time { font-size:12px; }
      .footer-inner { flex-direction:column; align-items:flex-start; }
      .footer-copy { text-align:left; }
    }
    @media print {
      body { background:white; color:#111; }
      .poster { box-shadow:none; }
      .detail-main, .site-footer { background:#fff; color:#111; }
      .invite-cell, .two-col-cell, .team-cell, .schedule-section, .chips-section { box-shadow:none; break-inside:avoid; color:#111; }
    }
  
    /* --- Dynamic D-Day & BGM controls --- */
    .poster-dday-overlay {
      position:absolute;
      top:2.08%;
      left:24.35%;
      z-index:4;
      min-width:clamp(74px, 8.6vw, 122px);
      height:clamp(20px, 2.42vw, 34px);
      padding:0 clamp(8px, .95vw, 14px);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--gold2);
      font-family:"Playfair Display", "Noto Serif KR", serif;
      font-size:clamp(14px, 1.58vw, 24px);
      font-weight:700;
      letter-spacing:.075em;
      line-height:1;
      text-shadow:0 2px 8px rgba(0,0,0,.68), 0 0 16px rgba(242,211,146,.30);
      background:linear-gradient(90deg, rgba(2,8,18,.96) 0%, rgba(2,8,18,.90) 70%, rgba(2,8,18,.18) 100%);
      border-radius:2px;
      pointer-events:none;
      transform:translateY(-1px);
    }
    .poster-dday-overlay::before,
    .poster-dday-overlay::after {
      content:"";
      position:absolute;
      left:0;
      right:8%;
      height:1px;
      background:linear-gradient(90deg, rgba(242,211,146,.12), rgba(242,211,146,.70), rgba(242,211,146,.10));
      opacity:.72;
      pointer-events:none;
    }
    .poster-dday-overlay::before { top:-2px; }
    .poster-dday-overlay::after { bottom:-2px; }
    .poster-dday-overlay.is-today {
      color:#fff7df;
      text-shadow:0 0 18px rgba(242,211,146,.50), 0 2px 8px rgba(0,0,0,.62);
    }
    .bgm-control {
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:40;
      display:inline-flex;
      align-items:center;
      gap:9px;
      height:48px;
      padding:0 16px 0 14px;
      border:1px solid rgba(242,211,146,.54);
      border-radius:999px;
      background:rgba(2,8,18,.72);
      color:var(--gold2);
      font-family:"DM Mono", monospace;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 14px 38px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.05);
      transition:transform .22s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease;
    }
    .bgm-control:hover {
      transform:translateY(-2px);
      border-color:rgba(242,211,146,.86);
      background:rgba(2,8,18,.86);
      box-shadow:0 18px 48px rgba(0,0,0,.48), 0 0 24px rgba(242,211,146,.12);
    }
    .bgm-control:focus-visible {
      outline:2px solid rgba(242,211,146,.72);
      outline-offset:4px;
    }
    .bgm-icon {
      width:24px;
      height:24px;
      display:grid;
      place-items:center;
      border-radius:50%;
      border:1px solid rgba(242,211,146,.40);
      background:rgba(242,211,146,.09);
      font-size:13px;
      line-height:1;
    }
    .bgm-control.is-playing .bgm-icon {
      animation:bgmPulse 1.8s ease-in-out infinite;
      background:rgba(242,211,146,.17);
    }
    @keyframes bgmPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(242,211,146,.22); }
      50% { box-shadow:0 0 0 8px rgba(242,211,146,0); }
    }
    .bgm-toast {
      position:fixed;
      right:22px;
      bottom:82px;
      z-index:39;
      max-width:min(320px, calc(100vw - 44px));
      padding:12px 15px;
      border:1px solid rgba(242,211,146,.40);
      border-radius:15px;
      background:rgba(2,8,18,.78);
      color:rgba(255,244,220,.92);
      font-size:13px;
      line-height:1.55;
      box-shadow:0 14px 36px rgba(0,0,0,.36);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      transition:opacity .38s ease, transform .38s ease;
    }
    .bgm-toast.show {
      opacity:1;
      transform:translateY(0);
    }
    @media (max-width:760px) {
      .poster-dday-overlay {
        top:2.04%;
        left:24.05%;
        min-width:clamp(56px, 15vw, 76px);
        height:clamp(15px, 5vw, 22px);
        padding:0 7px;
        font-size:clamp(10px, 3.1vw, 14px);
        letter-spacing:.055em;
      }
      .poster-dday-overlay::before { top:-1px; }
      .poster-dday-overlay::after { bottom:-1px; }
      .bgm-control {
        right:14px;
        bottom:14px;
        height:44px;
        padding:0 13px 0 12px;
        font-size:10px;
      }
      .bgm-toast {
        right:14px;
        bottom:68px;
      }
    }
    @media print {
      .poster-dday-overlay { color:#111; background:#fff; text-shadow:none; }
      .bgm-control, .bgm-toast { display:none !important; }
    }

  </style>
