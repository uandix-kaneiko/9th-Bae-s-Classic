<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>9th Bae's Classic Open 2026 - Golf, Travel and People</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* ── RESET & COLOR PALETTE ── */
    :root {
      --bg-base: #0a0b0a;           /* 깊은 흑색 (미드나이트) */
      --bg-surface: #121413;        /* 고급스러운 다크 차콜 */
      --bg-surface-hover: #191c1a;
      --text-main: #F2EBE1;         /* 부드러운 아이보리 텍스트 */
      --text-muted: #A39B8B;        /* 우아한 베이지 텍스트 */
      --gold: #D4AF37;              /* 샴페인 골드 */
      --gold-light: #E8D0A5;
      --gold-dark: #997A21;
      --border: rgba(212, 175, 55, 0.2);
      --border-strong: rgba(212, 175, 55, 0.4);
      
      --font-serif: "Playfair Display", "Noto Serif KR", serif;
      --font-sans: "Noto Sans KR", sans-serif;
      --font-mono: "DM Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      background-color: var(--bg-base);
      background-image: radial-gradient(circle at 50% 0%, #151816 0%, #0a0b0a 100%);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }
    ::selection { background: var(--gold); color: #000; }

    /* ── LAYOUT ── */
    .wrap {
      width: min(1040px, 100% - 48px);
      margin: 0 auto;
    }

    /* ── OPENING OVERLAY ── */
    .opening-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg-base);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
    }
    body.opening-done .opening-overlay { opacity: 0; visibility: hidden; pointer-events: none; }
    .opening-inner { text-align: center; padding: 40px; }
    .opening-num {
      font-family: var(--font-serif);
      font-size: clamp(100px, 18vw, 220px);
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 1s 0.2s forwards;
    }
    .opening-label {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.3em;
      color: var(--gold); margin-top: 24px;
      opacity: 0; animation: fadeUp 1s 0.4s forwards;
    }
    .opening-title-line {
      font-family: var(--font-serif); font-size: clamp(24px, 4vw, 36px);
      color: var(--text-main); margin-top: 12px;
      opacity: 0; animation: fadeUp 1s 0.6s forwards;
    }
    .opening-dday-wrap {
      margin-top: 40px; padding: 20px 40px;
      border: 1px solid var(--border-strong);
      border-radius: 50px; display: inline-block;
      background: rgba(212, 175, 55, 0.05); backdrop-filter: blur(10px);
      opacity: 0; animation: fadeUp 1s 0.8s forwards;
    }
    .opening-dday-label { font-family: var(--font-mono); font-size: 11px; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.1em;}
    .opening-dday-value { font-family: var(--font-serif); font-size: 40px; color: var(--text-main); line-height: 1;}
    .opening-date-line {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 24px; letter-spacing: 0.15em;
      opacity: 0; animation: fadeUp 1s 1s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── AMBIENT CUE ── */
    .ambient-cue {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 11, 10, 0.8); border: 1px solid var(--border);
      padding: 12px 24px; border-radius: 30px; font-size: 12px; color: var(--gold-light);
      backdrop-filter: blur(10px); z-index: 90; transition: opacity 0.5s;
    }
    body.opening-done .ambient-cue, body.sound-started .ambient-cue { opacity: 0; pointer-events: none; }

    /* ── HERO SECTION ── */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 140px 0 80px; overflow: hidden;
    }
    /* 지저분한 배경 효과 제거 후 깔끔한 여백 유지 */
    .hero-grain, .hero-stripe, .hero-bg-num { display: none; }
    
    .dday-badge.dday-topline {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(10,11,10,0.85); backdrop-filter: blur(12px);
      padding: 12px 0; overflow: hidden;
    }
    .dday-ticker-shell { width: 100%; overflow: hidden; }
    .dday-ticker-track {
      display: flex; gap: 32px; align-items: center; white-space: nowrap;
      animation: marquee 25s linear infinite;
    }
    .dday-label { font-family: var(--font-mono); font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em;}
    .dday-value { font-family: var(--font-serif); font-size: 20px; color: var(--text-main); font-style: italic;}
    .dday-inline-sep { color: var(--gold); opacity: 0.4; }
    .dday-inline-copy { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); font-weight: 300;}
    
    .hero-kicker { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .hero-kicker-line { width: 40px; height: 1px; background: var(--gold); }
    .hero-kicker-text { font-family: var(--font-mono); font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.25em; }

    .hero-title-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .hero-title {
      font-family: var(--font-serif); font-size: clamp(48px, 8vw, 100px);
      line-height: 1.1; margin: 0 0 24px; font-weight: 400;
    }
    .hero-title em { font-style: italic; color: var(--gold); }
    .hero-title-emblem-wrap { display: inline-block; }
    .hero-title-emblem { height: clamp(50px, 7vw, 80px); vertical-align: middle; margin: 0 8px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));}
    
    .hero-sub { font-size: clamp(16px, 2vw, 20px); color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em;}
    .hero-divider { width: 100%; height: 1px; background: var(--border); margin: 60px 0 40px; }

    .hero-meta-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 24px; }
    .hero-meta-item { border-left: 1px solid var(--border); padding-left: 24px; transition: border-color 0.3s;}
    .hero-meta-item:hover { border-left-color: var(--gold); }
    .hero-meta-label { font-family: var(--font-mono); font-size: 10px; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.2em; text-transform: uppercase; }
    .hero-meta-value { font-family: var(--font-sans); font-size: 16px; color: var(--text-main); font-weight: 400;}

    /* ── MARQUEE BAND ── */
    .slogan-band { background: var(--gold); padding: 14px 0; overflow: hidden; }
    .slogan-scroll {
      display: flex; gap: 40px; white-space: nowrap; 
      font-family: var(--font-mono); font-size: 12px; color: #000; font-weight: 500; text-transform: uppercase; letter-spacing: 0.15em;
      animation: marquee 30s linear infinite;
    }
    .slogan-scroll .dot { opacity: 0.4; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── MAIN SECTIONS ── */
    main { padding: 100px 0; }
    .section-head { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 48px; }
    .section-head:not(:first-child) { margin-top: 120px; }
    .section-num { font-family: var(--font-serif); font-size: 36px; color: transparent; -webkit-text-stroke: 1px var(--gold); line-height: 0.8; font-style: italic;}
    .section-title { font-family: var(--font-serif); font-size: 32px; color: var(--text-main); line-height: 1; font-weight: 400;}
    .section-rule { flex: 1; height: 1px; background: var(--border); margin-bottom: 8px; }

    /* ── GLOBAL CARDS ── */
    .invite-cell, .two-col-cell, .team-cell, .schedule-section, .chips-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 48px; border-radius: var(--radius-md);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* ── 01 INVITATION ── */
    .invite-block { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 24px; }
    .invite-cell-label, .two-col-cell-title { font-family: var(--font-mono); font-size: 11px; color: var(--gold); margin-bottom: 24px; letter-spacing: 0.2em; text-transform: uppercase;}
    .invite-cell p { font-size: 16px; color: var(--text-muted); line-height: 1.8; font-weight: 300; }
    .invite-cell p strong { color: var(--text-main); font-weight: 400; }
    .invite-quote {
      margin-top: 32px; padding-left: 24px; border-left: 1px solid var(--gold);
      font-family: var(--font-serif); font-size: 15px; color: var(--gold-light); font-style: italic; line-height: 1.8;
    }
    .invite-cell.accent { background: #0E100F; border-color: var(--border-strong); }
    .invite-icon-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 48px; }
    .invite-icon-card { text-align: center; }
    .invite-icon-card .ico { font-size: 24px; color: var(--gold); margin-bottom: 16px; display: block; }
    .invite-icon-card strong { font-family: var(--font-serif); font-size: 16px; color: var(--text-main); display: block; margin-bottom: 6px; font-weight: 400;}
    .invite-icon-card span { font-size: 12px; color: var(--text-muted); font-weight: 300;}

    /* ── 02 HIGHLIGHTS ── */
    .chips-section { padding: 40px; }
    .chips { display: flex; flex-wrap: wrap; gap: 12px; }
    .chip {
      padding: 12px 24px; border: 1px solid var(--border); border-radius: 30px;
      background: transparent; font-size: 14px; color: var(--text-main);
      display: flex; align-items: center; gap: 10px; font-weight: 300; transition: all 0.3s;
    }
    .chip:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
    .chip::before { content: ""; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

    /* ── 03 PARTICIPANTS & FORMAT ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .name-cell {
      border-bottom: 1px solid var(--border); padding: 12px 0;
      font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 12px; font-weight: 300;
    }
    .name-cell::before { content: ""; width: 4px; height: 4px; background: var(--gold); }

    .format-card { display: flex; gap: 24px; padding: 24px 0; border-bottom: 1px solid var(--border); }
    .format-card:last-child { border-bottom: none; padding-bottom: 0; }
    .format-card:first-of-type { padding-top: 0; }
    .format-num {
      width: 50px; height: 50px; flex-shrink: 0; border-radius: 50%;
      background: transparent; border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 20px; color: var(--gold); font-style: italic;
    }
    .format-body strong { font-family: var(--font-serif); font-size: 18px; color: var(--text-main); display: block; margin-bottom: 6px; font-weight: 400;}
    .format-body span { font-size: 14px; color: var(--text-muted); font-weight: 300; line-height: 1.6;}

    /* ── 04 TEAMS ── */
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .team-cell { padding: 40px; transition: all 0.4s ease; border-color: var(--border-strong); }
    .team-cell:hover { transform: translateY(-4px); border-color: var(--gold); background: var(--bg-surface-hover); box-shadow: 0 20px 50px rgba(0,0,0,0.6);}
    .team-num { font-family: var(--font-mono); font-size: 11px; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.15em;}
    .team-num::before { content: ""; width: 30px; height: 1px; background: var(--gold); }
    .team-pair { display: grid; grid-template-columns: 1fr 1fr 40px 1fr 1fr; align-items: center; gap: 12px; }
    .team-player {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 10px; text-align: center;
    }
    .team-player-name { font-size: 14px; color: var(--text-main); font-weight: 300; }
    .team-divider { text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--gold-dark); }

    /* ── 05 SCHEDULE ── */
    .day-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
    .day-tab {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 24px;
      display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;
    }
    .day-tab.primary { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
    .day-tab-date { font-family: var(--font-serif); font-size: 18px; color: var(--text-main); }
    .day-tab.primary .day-tab-date { color: var(--gold-light); }
    .day-tab-pill {
      font-family: var(--font-mono); font-size: 10px; padding: 6px 16px;
      border: 1px solid var(--border); border-radius: 30px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .day-tab.primary .day-tab-pill { border-color: var(--gold); color: var(--gold); }

    .schedule-body { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .sched-col { border-left: 1px solid var(--border); padding-left: 24px; position: relative; }
    .sched-row { display: grid; grid-template-columns: 70px 1fr; gap: 24px; padding: 24px 0; border-bottom: 1px solid var(--border-light); position: relative;}
    .sched-row:last-child { border-bottom: none; padding-bottom: 0; }
    .sched-row:first-child { padding-top: 0; }
    .sched-row::before {
      content: ""; position: absolute; left: -27.5px; top: 30px; width: 6px; height: 6px;
      background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 4px var(--bg-surface);
    }
    .sched-row:first-child::before { top: 6px; }
    .sched-time { font-family: var(--font-mono); font-size: 12px; color: var(--gold); letter-spacing: 0.05em;}
    .sched-title { font-family: var(--font-serif); font-size: 17px; color: var(--text-main); margin-bottom: 6px; font-weight: 400;}
    .sched-desc { font-size: 14px; color: var(--text-muted); font-weight: 300;}

    /* ── FOOTER ── */
    .site-footer { border-top: 1px solid var(--border-strong); padding: 48px 0; background: #050505;}
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
    .footer-logo { font-family: var(--font-serif); font-size: 20px; color: var(--gold-light); display: flex; align-items: center; gap: 12px; }
    .footer-emblem { height: 32px; object-fit: contain; filter: grayscale(1) brightness(1.5); opacity: 0.8;}
    .footer-copy { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase;}

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .invite-block, .two-col, .teams-grid, .schedule-body, .day-tabs { grid-template-columns: 1fr; }
      .name-grid { grid-template-columns: 1fr; }
      .sched-col { border-left: none; padding-left: 0; }
      .sched-row::before { display: none; }
    }
    @media (max-width: 760px) {
      .hero { padding: 100px 0 60px; }
      .hero-title { font-size: 42px; }
      .hero-meta-row { grid-template-columns: 1fr 1fr; gap: 16px;}
      .invite-cell, .two-col-cell, .team-cell, .schedule-section, .chips-section { padding: 32px 24px; }
      .section-head { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 32px;}
      .section-rule { width: 100%; }
      .team-pair { grid-template-columns: 1fr 1fr; gap: 8px; }
      .team-divider { grid-column: 1 / -1; margin: 8px 0; }
      .day-tab { flex-direction: column; align-items: flex-start; gap: 16px; }
      .sched-row { grid-template-columns: 1fr; gap: 8px; padding: 20px 0; }
      .footer-inner { flex-direction: column; justify-content: center; text-align: center; }
    }
  </style>
</head>
